name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — no CGO, both arches build on Ubuntu
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cgo_enabled: "0"
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cgo_enabled: "0"
          # Darwin — CGO required for IOKit (lid detection)
          # Each arch gets its own native runner to avoid cross-CGO complexity
          - os: macos-13        # Intel
            goos: darwin
            goarch: amd64
            cgo_enabled: "1"
          - os: macos-latest    # Apple Silicon
            goos: darwin
            goarch: arm64
            cgo_enabled: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo_enabled }}
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o stratus-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/agent/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: stratus-${{ matrix.goos }}-${{ matrix.goarch }}
          generate_release_notes: true
