services:
  - type: web
    name: stratus-public
    runtime: python
    rootDir: cmd/controller
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run uvicorn main_public:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SERVER_SECRET
        sync: false
      - key: TAILSCALE_API_KEY
        sync: false
      - key: TAILSCALE_TAILNET
        value: "-"
      - key: ALLOWED_ORIGIN
        sync: false          # set to your Vercel URL, e.g. https://stratus.vercel.app
      - key: PYTHON_VERSION
        value: "3.11"
