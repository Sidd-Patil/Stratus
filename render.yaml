services:
  - type: web
    name: stratus-controller
    runtime: python
    rootDir: cmd/controller
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SERVER_SECRET
        sync: false
      - key: TAILSCALE_API_KEY
        sync: false
      - key: TAILSCALE_TAILNET
        value: "-"
      - key: PYTHON_VERSION
        value: "3.11"
